name: supervisord
display_name: PHP + Supervisord
category: runtime
description: PHP-FPM with Supervisord process manager (workers, websockets, queues)
default_image: "php:8.3-fpm-bookworm"
versions:
  - label: "8.5"
    image: "php:8.5-fpm-bookworm"
  - label: "8.4"
    image: "php:8.4-fpm-bookworm"
  - label: "8.3"
    image: "php:8.3-fpm-bookworm"
  - label: "8.2"
    image: "php:8.2-fpm-bookworm"
  - label: "8.1"
    image: "php:8.1-fpm-bookworm"
  - label: "8.0"
    image: "php:8.0-fpm-bullseye"
  - label: "7.4"
    image: "php:7.4-fpm-bullseye"
dockerfile: |
  RUN if [ -f /etc/apt/sources.list ]; then \
        sed -i '/security/d; /updates/d' /etc/apt/sources.list; \
        sed -i 's|deb.debian.org|archive.debian.org|g' /etc/apt/sources.list; \
      fi \
      && apt-get update && apt-get install -y \
      libzip-dev libpng-dev libonig-dev libxml2-dev libcurl4-openssl-dev unzip supervisor \
      libc-client2007e-dev libkrb5-dev libssl-dev \
      && docker-php-ext-configure imap --with-kerberos --with-imap-ssl \
      && docker-php-ext-install imap \
      && docker-php-ext-install pdo pdo_mysql zip gd mbstring xml curl bcmath \
      && (docker-php-ext-install opcache 2>/dev/null || true) \
      && apt-get clean && rm -rf /var/lib/apt/lists/* \
      && mkdir -p /etc/supervisor/conf.d /var/log/supervisor
  COPY <<'CONF' /etc/supervisor/supervisord.conf
  [supervisord]
  nodaemon=true
  logfile=/var/log/supervisor/supervisord.log
  pidfile=/var/run/supervisord.pid

  [inet_http_server]
  port=0.0.0.0:9001

  [rpcinterface:supervisor]
  supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

  [supervisorctl]
  serverurl=http://127.0.0.1:9001

  [program:php-fpm]
  command=php-fpm --nodaemonize
  autostart=true
  autorestart=true
  stdout_logfile=/dev/stdout
  stdout_logfile_maxbytes=0
  stderr_logfile=/dev/stderr
  stderr_logfile_maxbytes=0

  [include]
  files = /etc/supervisor/conf.d/*.conf
  CONF
  CMD ["/usr/bin/supervisord", "-c", "/etc/supervisor/supervisord.conf"]
ports:
  - internal: 9000
    protocol: tcp
    description: PHP-FPM
  - internal: 9001
    protocol: tcp
    description: Supervisor Web UI
environment:
  PHP_MEMORY_LIMIT:
    default: "256M"
    description: "PHP memory limit"
mount_project_path: /var/www/html
volumes:
  - target: /var/www/html
    description: "Application code"
  - target: /etc/supervisor/conf.d
    description: "Supervisor custom configs"
